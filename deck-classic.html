<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud &amp; Fire // Command Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* =====================================================================
   CLOUD & FIRE — COMMAND DECK
   Single file — fully portable. Double-click to run, copy anywhere.
   All content lives in the DECK DATA block (search "DECK DATA START").
   A Claude session refreshes the deck by rewriting that block only;
   the shell (everything else) should rarely change.
   Keys 0-9 jump between project lines.
   ===================================================================== */

:root{
  /* night base */
  --bg:#080b11;
  --bg2:#0a0e16;
  --panel:rgba(17,23,34,0.72);
  --panel-solid:#111722;
  --line:#1d2837;
  --line-soft:#16202e;

  /* cloud (cool / structural) */
  --cloud:#7d9bbd;
  --cloud-dim:#56708c;

  /* fire (live / load-bearing) */
  --fire:#e8913a;
  --fire-hot:#ff6b35;
  --fire-glow:rgba(232,145,58,0.18);

  /* text */
  --ink:#cdd6e3;
  --ink-mute:#6f7e92;
  --ink-faint:#465468;

  /* state */
  --ok:#4ade80;
  --warn:#e8c14a;
  --risk:#f0556b;

  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Inter',system-ui,-apple-system,Segoe UI,sans-serif;
  --serif:Georgia,'Times New Roman',serif;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:
    radial-gradient(1200px 700px at 78% -8%, rgba(232,145,58,0.06), transparent 60%),
    radial-gradient(1000px 800px at 0% 110%, rgba(125,155,189,0.05), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  font-size:14px;
  overflow:hidden;
}
/* living shader wallpaper — sits behind the deck, shows through its
   translucent panels. Subdued at rest, glows on transition. If WebGL
   is unavailable the canvas stays empty and the body gradient shows.
   Press W to cycle the five wallpapers. */
#bgfx{position:fixed;inset:0;width:100%;height:100%;z-index:0;display:block}
#bgname{position:fixed;right:14px;bottom:44px;z-index:7;font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--cloud-dim);opacity:0;transition:opacity .4s;pointer-events:none}

/* boot loader — globe spins over the live wallpaper, then fades away */
#boot{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(8,11,17,.62);transition:opacity .6s ease}
#boot.gone{opacity:0;pointer-events:none}
#bootcard{width:220px;height:220px;border-radius:16px;background:#f2f0ea;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 48px rgba(0,0,0,.55)}
#bootglobe{width:200px;height:200px}
body::after{ /* faint vignette */
  content:"";position:fixed;inset:0;pointer-events:none;
  box-shadow:inset 0 0 240px rgba(0,0,0,0.55);
  z-index:5;
}

/* ---------- shell grid ---------- */
.deck{
  position:relative;
  z-index:1;
  height:100vh;
  display:grid;
  grid-template-columns: 220px 1fr 320px;
  grid-template-rows: 56px 1fr 34px;
  grid-template-areas:
    "top  top  top"
    "nav  main flags"
    "tick tick tick";
  gap:1px;
  padding:10px;
}

/* ---------- top bar ---------- */
.top{
  grid-area:top;
  display:flex;align-items:center;gap:22px;
  padding:0 16px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(20,27,40,0.85),rgba(12,17,26,0.85));
  position:relative;
}
.brand{display:flex;align-items:baseline;gap:10px;white-space:nowrap}
.brand .mark{
  font-family:var(--mono);font-weight:700;letter-spacing:.14em;
  font-size:13px;color:var(--ink);
}
.brand .mark b{color:var(--fire)}
.brand .sub{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--ink-faint);text-transform:uppercase}

.top .clock{font-family:var(--mono);font-size:20px;font-weight:500;letter-spacing:.06em;color:var(--ink)}
.top .clock .sec{color:var(--fire)}
.top .date{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--ink-mute);text-transform:uppercase;margin-top:2px}

.top .spacer{flex:1}

.metric{display:flex;flex-direction:column;gap:2px;min-width:64px}
.metric .k{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--ink-faint);text-transform:uppercase}
.metric .v{font-family:var(--mono);font-size:13px;color:var(--cloud)}

.statepill{
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  padding:6px 12px;border:1px solid var(--line);border-radius:2px;color:var(--ink-mute);
  display:flex;align-items:center;gap:8px;
}
.statepill .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
.statepill.hot{border-color:var(--fire);color:var(--fire)}
.statepill.hot .dot{background:var(--fire-hot);box-shadow:0 0 10px var(--fire-hot);animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ---------- left nav ---------- */
.nav{
  grid-area:nav;
  border:1px solid var(--line);
  background:var(--panel);
  display:flex;flex-direction:column;
  padding:12px 0;
  overflow:auto;
}
.nav .eyebrow{padding:0 16px 10px;font-family:var(--mono);font-size:9px;letter-spacing:.22em;color:var(--ink-faint);text-transform:uppercase}
.navitem{
  display:flex;align-items:center;gap:11px;
  padding:10px 16px;cursor:pointer;border-left:2px solid transparent;
  color:var(--ink-mute);transition:background .15s,color .15s,border-color .15s;
  user-select:none;
}
.navitem .ix{font-family:var(--mono);font-size:10px;color:var(--ink-faint);width:18px}
.navitem .lbl{font-size:13px;letter-spacing:.02em}
.navitem .pip{margin-left:auto;width:6px;height:6px;border-radius:50%;background:var(--line)}
.navitem .pip.g{background:var(--ok)}
.navitem .pip.y{background:var(--warn)}
.navitem .pip.r{background:var(--risk)}
.navitem .pip.d{background:var(--ink-faint)}
.navitem:hover{background:rgba(125,155,189,0.06);color:var(--ink)}
.navitem.active{background:rgba(232,145,58,0.08);border-left-color:var(--fire);color:var(--ink)}
.navitem.active .ix{color:var(--fire)}
.navitem:focus-visible{outline:2px solid var(--cloud);outline-offset:-2px}

.nav .capacity{margin-top:auto;padding:14px 16px 6px;border-top:1px solid var(--line-soft)}
.capacity .k{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--ink-faint);text-transform:uppercase;display:flex;justify-content:space-between}
.capacity .k b{color:var(--cloud);font-weight:500}
.capacity input[type=range]{width:100%;margin-top:8px;accent-color:var(--fire)}
.capacity .hint{font-size:10px;color:var(--ink-faint);margin-top:6px;min-height:14px}

/* ---------- dispatch ---------- */
.dispatchbar{padding:0 14px 12px;border-bottom:1px solid var(--line-soft);margin-bottom:10px}
.dispatchbar .row{display:flex;gap:6px}
.dispatchbar input{flex:1;min-width:0;background:rgba(13,18,27,.7);border:1px solid var(--line);color:var(--ink);font-family:var(--mono);font-size:11px;padding:7px 8px;border-radius:2px;outline:none}
.dispatchbar input::placeholder{color:var(--ink-faint)}
.dispatchbar input:focus{border-color:var(--cloud-dim)}
.dispatchbar button{background:none;border:1px solid var(--line);color:var(--ink-mute);width:30px;cursor:pointer;border-radius:2px;font-size:12px;line-height:1}
.dispatchbar button:hover{color:var(--ink);border-color:var(--cloud-dim)}
.dispatchbar button.listening{color:var(--fire);border-color:var(--fire);animation:pulse 1.2s infinite}
.dqpanel{border-top:1px solid var(--line);padding:10px 14px;display:none;max-height:170px;overflow:auto}
.dqpanel.has{display:block}
.dqhead{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--ink-faint);text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dqhead .act{margin-left:auto;display:flex;gap:6px}
.dqhead button{background:none;border:1px solid var(--line);color:var(--ink-mute);font-family:var(--mono);font-size:8px;letter-spacing:.1em;padding:2px 6px;cursor:pointer;text-transform:uppercase}
.dqhead button:hover{color:var(--ink)}
.dqitem{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--line-soft);align-items:flex-start}
.dqitem:last-child{border-bottom:0}
.dqitem .tm{font-family:var(--mono);font-size:9px;color:var(--fire);white-space:nowrap;padding-top:2px}
.dqitem .tx{flex:1;font-size:11.5px;color:var(--ink);line-height:1.45}
.dqitem .rm{background:none;border:0;color:var(--ink-faint);cursor:pointer;font-size:11px;padding:0 2px}
.dqitem .rm:hover{color:var(--risk)}

/* ---------- main panel ---------- */
.main{
  grid-area:main;
  border:1px solid var(--line);
  background:var(--panel);
  overflow:auto;
  padding:18px 20px 24px;
  position:relative;
}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;border-bottom:1px solid var(--line-soft);padding-bottom:12px;flex-wrap:wrap;gap:10px}
.pagehead h1{margin:0;font-size:20px;font-weight:600;letter-spacing:.01em;color:var(--ink)}
.pagehead .crumb{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--ink-faint);text-transform:uppercase;margin-bottom:6px}
.pagehead .meta{font-family:var(--mono);font-size:11px;color:var(--cloud-dim);text-align:right}

/* generic HUD panel */
.grid{display:grid;gap:12px}
.panel{
  position:relative;
  border:1px solid var(--line);
  background:rgba(13,18,27,0.55);
  padding:13px 14px;
}
.panel::before,.panel::after{ /* HUD corner ticks */
  content:"";position:absolute;width:8px;height:8px;border-color:var(--cloud-dim);opacity:.5;
}
.panel::before{top:-1px;left:-1px;border-top:1px solid;border-left:1px solid}
.panel::after{bottom:-1px;right:-1px;border-bottom:1px solid;border-right:1px solid}
.panel.live{border-color:rgba(232,145,58,0.4);background:linear-gradient(180deg,var(--fire-glow),rgba(13,18,27,0.55))}
.panel.live::before,.panel.live::after{border-color:var(--fire)}
.panel h3{margin:0 0 10px;font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--ink-faint);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.panel h3 .tag{margin-left:auto;font-size:9px;padding:2px 6px;border:1px solid var(--line);color:var(--cloud-dim)}

/* priority stack rows */
.prow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line-soft)}
.prow:last-child{border-bottom:0}
.prow .badge{font-family:var(--mono);font-size:9px;letter-spacing:.12em;padding:3px 7px;border-radius:2px;white-space:nowrap;min-width:74px;text-align:center}
.badge.nofail{background:rgba(240,85,107,0.14);color:var(--risk);border:1px solid rgba(240,85,107,0.5)}
.badge.behind{background:rgba(232,193,74,0.12);color:var(--warn);border:1px solid rgba(232,193,74,0.4)}
.badge.decision{background:rgba(125,155,189,0.12);color:var(--cloud);border:1px solid rgba(125,155,189,0.4)}
.badge.next{background:rgba(74,222,128,0.1);color:var(--ok);border:1px solid rgba(74,222,128,0.35)}
.prow .ptext{flex:1}
.prow .ptext .t{font-size:13px;color:var(--ink)}
.prow .ptext .s{font-size:11px;color:var(--ink-mute);margin-top:2px}
.prow .when{font-family:var(--mono);font-size:11px;color:var(--cloud-dim);white-space:nowrap}

/* traffic lights */
.tl{display:flex;align-items:center;gap:10px;padding:7px 0}
.tl .light{width:9px;height:9px;border-radius:50%;flex:none}
.tl .light.g{background:var(--ok);box-shadow:0 0 7px rgba(74,222,128,.6)}
.tl .light.y{background:var(--warn);box-shadow:0 0 7px rgba(232,193,74,.5)}
.tl .light.r{background:var(--risk);box-shadow:0 0 7px rgba(240,85,107,.5)}
.tl .light.d{background:var(--ink-faint)}
.tl .name{font-size:13px;color:var(--ink);flex:1}
.tl .note{font-size:11px;color:var(--ink-mute);font-family:var(--mono)}

/* gauge */
.gauge{display:flex;align-items:center;gap:14px}
.gauge svg{flex:none}
.gauge .read{font-family:var(--mono)}
.gauge .read .big{font-size:26px;color:var(--ink)}
.gauge .read .lbl{font-size:10px;letter-spacing:.16em;color:var(--ink-faint);text-transform:uppercase;margin-top:2px}
.gauge .read .nt{font-size:10px;color:var(--ink-mute);margin-top:3px}

/* pipeline bars */
.pipe{display:flex;flex-direction:column;gap:9px}
.pipe .seg{display:flex;align-items:center;gap:10px}
.pipe .seg .nm{font-size:12px;color:var(--ink-mute);width:96px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.pipe .seg .track{flex:1;height:7px;background:var(--line-soft);position:relative;overflow:hidden}
.pipe .seg .fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--cloud-dim),var(--cloud))}
.pipe .seg .ct{font-family:var(--mono);font-size:11px;color:var(--cloud);width:24px;text-align:right}

/* simple item lists for project pages */
.list{display:flex;flex-direction:column}
.litem{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft);align-items:flex-start}
.litem:last-child{border-bottom:0}
.litem .st{font-family:var(--mono);font-size:9px;letter-spacing:.1em;padding:3px 7px;border-radius:2px;white-space:nowrap;margin-top:1px;border:1px solid var(--line);color:var(--ink-mute)}
.st.done{color:var(--ok);border-color:rgba(74,222,128,.3)}
.st.active{color:var(--fire);border-color:rgba(232,145,58,.4)}
.st.draft{color:var(--cloud);border-color:rgba(125,155,189,.3)}
.st.queued{color:var(--ink-faint)}
.litem .body .t{font-size:13px;color:var(--ink)}
.litem .body .d{font-size:11.5px;color:var(--ink-mute);margin-top:3px;line-height:1.5}

.kv{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:12.5px}
.kv .k{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink-faint);text-transform:uppercase;white-space:nowrap;padding-top:1px}
.kv .v{color:var(--ink)}

/* ---------- right flags rail ---------- */
.flags{
  grid-area:flags;
  border:1px solid var(--line);
  background:var(--panel);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.flags .fhead{padding:12px 14px;border-bottom:1px solid var(--line-soft);font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--ink-faint);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.flags .fscroll{flex:1;overflow:auto;padding:6px 14px}
.flag{padding:11px 0;border-bottom:1px solid var(--line-soft)}
.flag:last-child{border-bottom:0}
.flag .top{display:flex;align-items:center;gap:8px;padding:0;border:0;background:none}
.flag .sev{width:7px;height:7px;border-radius:50%}
.sev.r{background:var(--risk)}.sev.y{background:var(--warn)}.sev.c{background:var(--cloud)}
.flag .ttl{font-size:12.5px;color:var(--ink);flex:1}
.flag .dsc{font-size:11px;color:var(--ink-mute);margin-top:5px;line-height:1.5;padding-left:15px}

/* contemplative line — the serif signature */
.verse{padding:13px 14px;border-top:1px solid var(--line)}
.verse .ref{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--fire);text-transform:uppercase;margin-bottom:6px}
.verse .txt{font-family:var(--serif);font-size:13.5px;font-style:italic;color:var(--cloud);line-height:1.55}

/* ---------- ticker ---------- */
.tick{
  grid-area:tick;
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(18,24,36,0.9),rgba(10,14,22,0.9));
  display:flex;align-items:center;overflow:hidden;
}
.tick .lead{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--bg);background:var(--cloud);padding:0 12px;height:100%;display:flex;align-items:center;text-transform:uppercase;white-space:nowrap}
.tickwrap{flex:1;overflow:hidden;white-space:nowrap}
.tickmove{display:inline-block;padding-left:100%;animation:scroll 46s linear infinite;font-family:var(--mono);font-size:12px;color:var(--ink-mute);letter-spacing:.04em}
.tickmove span{margin:0 30px}
.tickmove b{color:var(--fire);font-weight:500}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-100%)}}

/* ---------- the Pillar (far-right signature) ---------- */
.pillar{
  position:fixed;top:0;right:0;width:5px;height:100%;z-index:6;pointer-events:none;
  background:linear-gradient(180deg,#243042 0%,var(--cloud-dim) 20%,#1d2837 50%,var(--fire) 86%,var(--fire-hot) 100%);
  filter:blur(.3px);opacity:.85;
}
.pillar::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,0.5),transparent);
  height:32%;animation:shimmer 6.5s ease-in-out infinite;
}
@keyframes shimmer{0%{transform:translateY(-40%);opacity:0}50%{opacity:.5}100%{transform:translateY(320%);opacity:0}}

/* low-capacity dimming */
body.conserve .panel:not(.live){opacity:.5}
body.conserve .flags .flag:not(.r){opacity:.55}

/* scrollbars */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

@media (prefers-reduced-motion: reduce){
  .tickmove{animation:none;padding-left:0}
  .pillar::after{animation:none;opacity:0}
  .statepill.hot .dot{animation:none}
}

@media (max-width:1100px){
  .deck{grid-template-columns:180px 1fr;grid-template-areas:"top top" "nav main" "tick tick"}
  .flags{display:none}
}
.cols-2{grid-template-columns:1fr 1fr}
.cols-3{grid-template-columns:1fr 1fr 1fr}
@media (max-width:1500px){.cols-3{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<canvas id="bgfx" aria-hidden="true"></canvas>
<div id="bgname"></div>
<div id="boot"><div id="bootcard"><canvas id="bootglobe" width="200" height="200" role="img" aria-label="Loading"></canvas></div></div>
<div class="pillar" id="pillar"></div>
<div class="deck">

  <!-- TOP BAR -->
  <header class="top">
    <div class="brand">
      <span class="mark">CLOUD &amp; <b>FIRE</b></span>
      <span class="sub">Command Deck</span>
    </div>
    <div>
      <div class="clock" id="clock">--:--:--</div>
      <div class="date" id="date">—</div>
    </div>
    <div class="spacer"></div>
    <div class="metric"><span class="k">Manhattan KS</span><span class="v" id="wx">— wiring…</span></div>
    <div class="metric"><span class="k">Rhythm</span><span class="v" id="rhythm">—</span></div>
    <div class="metric"><span class="k">Synced</span><span class="v" id="synced">—</span></div>
    <div class="statepill" id="statepill"><span class="dot"></span><span id="statetxt">SYSTEMS NOMINAL</span></div>
  </header>

  <!-- LEFT NAV -->
  <nav class="nav" id="nav">
    <div class="dispatchbar">
      <div class="eyebrow" style="padding:0 0 8px">Dispatch</div>
      <div class="row">
        <input id="dinput" placeholder="dispatch… ( / )" aria-label="Dispatch input">
        <button id="dmic" title="Voice dispatch" aria-label="Voice dispatch">◉</button>
      </div>
    </div>
    <div class="eyebrow">Project Lines</div>
    <!-- nav items injected -->
    <div class="capacity">
      <div class="k"><span>Capacity</span><b id="capval">3 / 5</b></div>
      <input type="range" id="capacity" min="1" max="5" step="1" value="3" aria-label="Energy capacity">
      <div class="hint" id="caphint"></div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main" id="main"><!-- page injected --></main>

  <!-- RIGHT FLAGS -->
  <aside class="flags">
    <div class="fhead"><span>Live Flags</span><span style="margin-left:auto;font-size:9px" id="flagcount"></span></div>
    <div class="fscroll" id="flagscroll"></div>
    <div class="dqpanel" id="dqpanel">
      <div class="dqhead"><span>Dispatch Queue</span><span id="dqn"></span>
        <span class="act"><button id="dqcopy">copy</button><button id="dqclear">clear</button></span>
      </div>
      <div id="dqlist"></div>
    </div>
    <div class="verse">
      <div class="ref" id="verseref">—</div>
      <div class="txt" id="versetxt">—</div>
    </div>
  </aside>

  <!-- TICKER -->
  <footer class="tick">
    <div class="lead">Carry Forward</div>
    <div class="tickwrap"><div class="tickmove" id="ticker"></div></div>
  </footer>
</div>

<script>
/* =====================================================================
   DECK DATA START — sync protocol rewrites everything in this block.
   Schema:
   - updated:    ISO date of last sync (shown in top bar)
   - priorities: tag is nofail | behind | decision | next.
                 Any "nofail" entry flips the state pill to NO-FAIL ACTIVE.
   - lines:      light is g | y | r | d  (d = dormant/back-burnered)
   - sprint:     score 0-100, or null when no sprint is running

<script>
/* ---------- data guard (only trips if the data block above is broken) ---------- */
const DATA = window.DECK_DATA;
if(!DATA){
  document.getElementById('main').innerHTML =
    '<div style="font-family:var(--mono);color:var(--risk);padding:30px;font-size:13px">Deck data block failed to parse. Check the DECK DATA section of this file for a syntax error.</div>';
  throw new Error('DECK_DATA not found');
}
const NAV = DATA.nav;

/* nav id → line light, for the nav pips */
const LINE_LIGHT = {};
(DATA.lines||[]).forEach(l=>{
  const nav = NAV.find(n=>n.label.toLowerCase().startsWith(l.name.toLowerCase().slice(0,5)) || l.name.toLowerCase().startsWith(n.label.toLowerCase().slice(0,5)));
  if(nav) LINE_LIGHT[nav.id]=l.light;
});

/* ---------- safe persistence (works locally; no-op if blocked) ---------- */
const store = {
  get(k,d){ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};

/* ---------- renderers ---------- */
function el(tag,cls,html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }

function gauge(score){
  const r=34, c=2*Math.PI*r;
  if(score==null){
    return `<div class="gauge">
      <svg width="84" height="84" viewBox="0 0 84 84">
        <circle cx="42" cy="42" r="${r}" fill="none" stroke="var(--line)" stroke-width="6"/>
      </svg>
      <div class="read"><div class="big">—</div><div class="lbl">${DATA.sprint.label}</div>${DATA.sprint.note?`<div class="nt">${DATA.sprint.note}</div>`:''}</div>
    </div>`;
  }
  const off=c*(1-score/100);
  const col = score>=70?'var(--ok)':score>=45?'var(--warn)':'var(--risk)';
  return `<div class="gauge">
    <svg width="84" height="84" viewBox="0 0 84 84">
      <circle cx="42" cy="42" r="${r}" fill="none" stroke="var(--line)" stroke-width="6"/>
      <circle cx="42" cy="42" r="${r}" fill="none" stroke="${col}" stroke-width="6"
        stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
        transform="rotate(-90 42 42)" style="transition:stroke-dashoffset .8s ease"/>
    </svg>
    <div class="read"><div class="big">${score}</div><div class="lbl">${DATA.sprint.label}</div>${DATA.sprint.note?`<div class="nt">${DATA.sprint.note}</div>`:''}</div>
  </div>`;
}

function renderOverview(){
  const m = document.getElementById('main');
  m.innerHTML = `
    <div class="pagehead">

        <div id="pstack"></div>
      </div>
      <div class="panel">
        <h3>Line Health</h3>
        <div id="tlights"></div>
      </div>
      <div class="panel">

    </div>
    <div class="grid cols-2" style="margin-top:12px;align-items:start">
      <div class="panel">
        <h3>Writing Pipeline</h3>
        <div class="pipe" id="pipe"></div>
      </div>
      <div class="panel">
        <h3>Formation &amp; Rhythm</h3>
        <div class="kv">
          <div class="k">Mode</div><div class="v">${DATA.rhythm} — focused execution</div>
          <div class="k">Daily</div><div class="v">Acts + Romans · Notion Bible Notes</div>
          <div class="k">Weekly</div><div class="v">Pastor Brian · synthesis review</div>
          <div class="k">Constraint</div><div class="v">Energy conservation is real — pace the deck to capacity</div>
        </div>
      </div>
    </div>`;

  const ps = document.getElementById('pstack');
  DATA.priorities.forEach(p=>{
    ps.appendChild(el('div','prow',
      `<span class="badge ${p.tag}">${p.tag.toUpperCase()}</span>
       <div class="ptext"><div class="t">${p.t}</div><div class="s">${p.s}</div></div>
       <span class="when">${p.when}</span>`));
  });

  const tl = document.getElementById('tlights');
  DATA.lines.forEach(l=>{
    tl.appendChild(el('div','tl',
      `<span class="light ${l.light}"></span><span class="name">${l.name}</span><span class="note">${l.note}</span>`));
  });

  const pipe = document.getElementById('pipe');
  DATA.pipeline.forEach(s=>{
    const seg=el('div','seg',
      `<span class="nm">${s.nm}</span>
       <span class="track"><span class="fill" style="width:${s.pct}%"></span></span>
       <span class="ct">${s.count}</span>`);
    pipe.appendChild(seg);
  });
}

function renderPage(id){
  const p = DATA.pages[id]; if(!p) return renderOverview();
  const m = document.getElementById('main');
  const kv = p.kv.map(([k,v])=>`<div class="k">${k}</div><div class="v">${v}</div>`).join('');
  const items = p.items.map(it=>`
    <div class="litem">
      <span class="st ${it.st}">${it.st.toUpperCase()}</span>
      <div class="body"><div class="t">${it.t}</div><div class="d">${it.d}</div></div>
    </div>`).join('');
  m.innerHTML = `
    <div class="pagehead">
      <div><div class="crumb">${p.crumb}</div><h1>${p.title}</h1></div>
      <div class="meta">${p.meta}</div>
    </div>
    <div class="grid cols-2" style="align-items:start">
      <div class="panel"><h3>Brief</h3><div class="kv">${kv}</div></div>
      <div class="panel"><h3>Active Items <span class="tag">${p.items.length}</span></h3><div class="list">${items}</div></div>
    </div>`;
}

function setActive(id){
  document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('active', n.dataset.id===id));
  if(id==='overview') renderOverview(); else renderPage(id);
  store.set('deck.view', id);
  document.dispatchEvent(new CustomEvent('deck:transition'));
}

/* ---------- nav build ---------- */
(function buildNav(){
  const nav = document.getElementById('nav');
  const cap = nav.querySelector('.capacity');
  NAV.forEach((n,i)=>{
    const item = el('div','navitem');
    item.tabIndex=0; item.dataset.id=n.id;
    item.innerHTML = `<span class="ix">${String(i).padStart(2,'0')}</span><span class="lbl">${n.label}</span><span class="pip ${LINE_LIGHT[n.id]||''}"></span>`;
    item.addEventListener('click',()=>setActive(n.id));
    item.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();setActive(n.id);} });
    nav.insertBefore(item, cap);
  });
})();

/* number keys 0-9 jump lines (ignored while typing in an input) */
document.addEventListener('keydown',e=>{
  if(e.target.matches && e.target.matches('input,textarea,select')) return;
  if(e.key>='0' && e.key<='9'){
    const n = NAV[+e.key];
    if(n) setActive(n.id);

/* ---------- flags + verse + ticker ---------- */
(function buildSide(){
  const fs = document.getElementById('flagscroll');

    const flag=el('div','flag '+(f.sev==='r'?'r':''));

    fs.appendChild(flag);

  document.getElementById('ticker').innerHTML =
    DATA.carry.map(c=>`<span>${c.replace(/(\[VERIFY\]|404|no-fail|deploy|back-burnered|zeroed|reset)/gi,'<b>$1</b>')}</span>`).join('') ;
})();

/* ---------- state pill: hot if any NO-FAIL ---------- */
(function stateline(){
  const nofail = DATA.priorities.some(p=>p.tag==='nofail');

/* ---------- clock ---------- */
function tick(){
  const d=new Date();
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clock').innerHTML =
    `${p(d.getHours())}:${p(d.getMinutes())}<span class="sec">:${p(d.getSeconds())}</span>`;

setInterval(tick,1000); tick();

/* ---------- live weather: Open-Meteo, no key, refresh 15 min ---------- */
const WX_CODES = {0:'Clear',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',
  51:'Drizzle',53:'Drizzle',55:'Drizzle',56:'Frz drizzle',57:'Frz drizzle',
  61:'Rain',63:'Rain',65:'Heavy rain',66:'Frz rain',67:'Frz rain',
  71:'Snow',73:'Snow',75:'Heavy snow',77:'Snow grains',
  80:'Showers',81:'Showers',82:'Heavy showers',85:'Snow showers',86:'Snow showers',
  95:'Storm',96:'Storm + hail',99:'Storm + hail'};
async function weather(){
  const elWx = document.getElementById('wx');
  try{
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=39.18&longitude=-96.57&current=temperature_2m,weather_code,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FChicago');
    const j = await r.json();
    const c = j.current;
    elWx.textContent = `${Math.round(c.temperature_2m)}°F · ${WX_CODES[c.weather_code]||'—'} · ${Math.round(c.wind_speed_10m)} mph`;
  }catch(e){
    elWx.textContent = 'wire down';
  }
}
weather(); setInterval(weather, 15*60*1000);

/* ---------- capacity ---------- */
const capInput=document.getElementById('capacity');
const capHints={
  1:"Low. Deck dims to no-fail and red flags only.",
  2:"Reduced. Secondary panels muted.",
  3:"Steady.",
  4:"Strong. Full field visible.",
  5:"Peak. Full field visible."
};
function applyCapacity(v){
  document.getElementById('capval').textContent=v+' / 5';
  document.getElementById('caphint').textContent=capHints[v]||'';
  document.body.classList.toggle('conserve', v<=2);
  store.set('deck.cap', v);
}
capInput.addEventListener('input',e=>applyCapacity(+e.target.value));

/* ---------- dispatch + voice ----------
   Captures quick dispatches (typed or spoken) into a local queue you
   can copy out at session start — "tell Patricia X", "log this", etc.
   Voice uses the Web Speech API (Chrome/Edge). The queue persists in
   localStorage so nothing is lost between reloads. Press "/" to focus. */
const dInput  = document.getElementById('dinput');
const dMic    = document.getElementById('dmic');
const dqPanel = document.getElementById('dqpanel');
const dqList  = document.getElementById('dqlist');
const dqN     = document.getElementById('dqn');

let DQ = [];
try{ DQ = JSON.parse(store.get('deck.dq','[]')) || []; }catch(e){ DQ = []; }

function dqSave(){ store.set('deck.dq', JSON.stringify(DQ)); }
function fmtTime(ts){ const d=new Date(ts); const p=n=>String(n).padStart(2,'0'); return p(d.getHours())+':'+p(d.getMinutes()); }

function renderDQ(){
  dqPanel.classList.toggle('has', DQ.length>0);
  dqN.textContent = DQ.length ? DQ.length+' QUEUED' : '';
  dqList.innerHTML = '';
  DQ.slice().reverse().forEach((d)=>{
    const row = el('div','dqitem',
      `<span class="tm">${fmtTime(d.ts)}</span><span class="tx"></span><button class="rm" aria-label="Remove">×</button>`);
    row.querySelector('.tx').textContent = d.text;
    row.querySelector('.rm').addEventListener('click',()=>{ DQ = DQ.filter(x=>x.id!==d.id); dqSave(); renderDQ(); });
    dqList.appendChild(row);
  });
}
function dispatch(text){
  text = (text||'').trim(); if(!text) return;
  DQ.push({ id:Date.now()+''+Math.random().toString(36).slice(2,6), ts:Date.now(), text });
  dqSave(); renderDQ();
  dInput.value=''; dInput.focus();
}

dInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); dispatch(dInput.value); } });
document.addEventListener('keydown',e=>{
  if(e.key==='/' && !(e.target.matches && e.target.matches('input,textarea,select'))){ e.preventDefault(); dInput.focus(); }
});

document.getElementById('dqcopy').addEventListener('click',()=>{
  if(!DQ.length) return;
  const txt = DQ.map(d=>`- [${fmtTime(d.ts)}] ${d.text}`).join('\n');
  const btn = document.getElementById('dqcopy');
  navigator.clipboard?.writeText(txt).then(()=>{ btn.textContent='copied'; setTimeout(()=>btn.textContent='copy',1200); })
    .catch(()=>{ btn.textContent='blocked'; setTimeout(()=>btn.textContent='copy',1200); });
});
document.getElementById('dqclear').addEventListener('click',()=>{ DQ=[]; dqSave(); renderDQ(); });

/* voice — Web Speech API; mic hidden if unsupported */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  const rec = new SR();
  rec.lang='en-US'; rec.interimResults=true; rec.continuous=false;
  let listening=false, finalText='';
  dMic.addEventListener('click',()=>{ try{ listening ? rec.stop() : rec.start(); }catch(e){} });
  rec.onstart = ()=>{ listening=true; dMic.classList.add('listening'); finalText=''; dInput.placeholder='listening…'; };
  rec.onerror = ()=>{ dInput.placeholder='mic unavailable'; setTimeout(()=>dInput.placeholder='dispatch… ( / )',1500); };
  rec.onend = ()=>{ listening=false; dMic.classList.remove('listening'); dInput.placeholder='dispatch… ( / )';
    if(finalText.trim()) dispatch(finalText); };
  rec.onresult = (ev)=>{
    let interim='';
    for(let i=ev.resultIndex;i<ev.results.length;i++){
      const r=ev.results[i];
      if(r.isFinal) finalText += r[0].transcript;
      else interim += r[0].transcript;
    }
    dInput.value = (finalText+interim).trim();
  };
} else {
  dMic.style.display='none';
  dMic.title='Voice not supported in this browser';
}

renderDQ();

/* ---------- living background ----------
   The deck's wallpaper is one of five WebGL shader fields (the same
   set as wallpapers.html, retuned for legibility). Each holds a low
   "rest" intensity so text stays readable, follows the cursor, and
   flares bright + glowy on every transition (the `deck:transition`
   event fired by setActive), then eases back. Press W to cycle them;
   the choice persists. Capacity 1-2 (conserve) dims further;
   prefers-reduced-motion renders a calm static frame. */
const bgPulse = (function bgfx(){
  const cv = document.getElementById('bgfx');
  const gl = cv.getContext('webgl') || cv.getContext('experimental-webgl');
  if(!gl){ cv.style.display='none'; return function(){}; }  /* body gradient shows as fallback */
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  function size(){ const d=Math.min(1.5,devicePixelRatio||1); cv.width=innerWidth*d; cv.height=innerHeight*d; gl.viewport(0,0,cv.width,cv.height); }
  size(); addEventListener('resize',size);

  const VS='attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
  const HDR='precision highp float;uniform vec2 u_res;uniform float u_time;uniform vec2 u_mouse;uniform float u_int;\n';
  const LIB='float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}\n'
    +'float n(vec2 p){vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1.,0.)),f.x),mix(h(i+vec2(0.,1.)),h(i+vec2(1.,1.)),f.x),f.y);}\n'
    +'float fbm(vec2 p){float v=0.;float a=.5;for(int i=0;i<5;i++){v+=a*n(p);p*=2.03;a*=.5;}return v;}\n';

  const BG=[
  {name:'Ember Flow',src:`void main(){vec2 uv=(gl_FragCoord.xy-.5*u_res)/u_res.y;vec2 m=(u_mouse-.5*u_res)/u_res.y;float dm=length(uv-m);vec2 q=uv*1.6+vec2(0.,u_time*.05);q+=(uv-m)*.32/(dm+.6);float f=fbm(q+1.2*fbm(q+u_time*.03));vec3 base=mix(vec3(.016,.027,.05),vec3(.05,.09,.15),f);float emb=smoothstep(.55,.95,f);vec3 col=base+vec3(.91,.45,.18)*emb*(.10+1.20*u_int);col+=vec3(.30,.42,.58)*exp(-dm*3.5)*(.03+.55*u_int);col*=(.82+1.30*u_int);col*=1.0-0.22*length(uv*vec2(.55,1.));gl_FragColor=vec4(col,1.);}`},
  {name:'Liquid Orbs',src:`float bl(vec2 d,float s){return s/(length(d)+.02);}void main(){vec2 uv=(gl_FragCoord.xy-.5*u_res)/u_res.y;vec2 m=(u_mouse-.5*u_res)/u_res.y;float t=u_time*.5;float v=0.;v+=bl(uv-m,.05);v+=bl(uv-vec2(sin(t*.7)*.6,cos(t*.9)*.34),.05);v+=bl(uv-vec2(sin(t*1.1+2.)*.5,sin(t*.6)*.42),.045);v+=bl(uv-vec2(cos(t*.5)*.55,sin(t*1.3+1.)*.3),.05);float field=smoothstep(.7,1.8,v);vec3 base=mix(vec3(.014,.024,.045),vec3(.06,.10,.16),field);vec3 col=base+vec3(.91,.45,.18)*smoothstep(1.7,2.7,v)*(.08+1.1*u_int);col*=(.82+1.2*u_int);col*=1.-0.22*length(uv*vec2(.55,1.));gl_FragColor=vec4(col,1.);}`},
  {name:'Warp Field',src:`void main(){vec2 uv=(gl_FragCoord.xy-.5*u_res)/u_res.y;vec2 mm=(u_mouse-.5*u_res)/u_res.y;uv-=mm*.3;vec3 col=vec3(.012,.02,.04);float sp=.4+u_int*2.5;for(int i=0;i<4;i++){float fi=float(i);float t=fract(u_time*.05*sp+fi*.25);float sc=mix(9.,.6,t);vec2 gv=fract(uv*sc)-.5;vec2 id=floor(uv*sc)+fi*119.;vec2 off=(vec2(h(id),h(id+7.))-.5)*.8;float star=smoothstep(.05,.0,length(gv-off));col+=star*t*t*(.4+u_int)*mix(vec3(.30,.42,.58),vec3(.91,.45,.18),step(.82,h(id+11.)));}col*=1.-0.2*length(uv*vec2(.55,1.));gl_FragColor=vec4(col,1.);}`},
  {name:'Circuit Cells',src:`vec2 h2(vec2 p){return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453);}void main(){vec2 uv=(gl_FragCoord.xy-.5*u_res)/u_res.y;vec2 m=(u_mouse-.5*u_res)/u_res.y;vec2 p=uv*4.5;vec2 ip=floor(p);vec2 fp=fract(p);float f1=8.,f2=8.;for(int y=-1;y<=1;y++){for(int x=-1;x<=1;x++){vec2 g=vec2(float(x),float(y));vec2 o=h2(ip+g);o=.5+.45*sin(u_time*.4+6.28*o);float d=length(g+o-fp);if(d<f1){f2=f1;f1=d;}else if(d<f2){f2=d;}}}float glow=exp(-(f2-f1)*9.);float boost=exp(-length(uv-m)*2.5);vec3 col=vec3(.013,.022,.045);col+=vec3(.18,.28,.42)*glow*(.12+.5*boost+.6*u_int);col+=vec3(.91,.45,.18)*glow*(.05+boost*.5)*u_int*1.4;col*=1.-0.2*length(uv*vec2(.55,1.));gl_FragColor=vec4(col,1.);}`},
  {name:'Ripple Pool',src:`void main(){vec2 uv=(gl_FragCoord.xy-.5*u_res)/u_res.y;vec2 m=(u_mouse-.5*u_res)/u_res.y;float dm=length(uv-m);float w=sin(dm*26.-u_time*4.)*exp(-dm*3.)*.5;float fr=length(uv);w+=sin(fr*22.-u_time*6.)*exp(-fr*2.)*u_int*1.2;vec3 base=mix(vec3(.016,.028,.052),vec3(.06,.10,.16),.5+.5*w);vec3 col=base+vec3(.91,.45,.18)*smoothstep(.5,1.,w)*(.1+.8*u_int);col*=(.85+.9*u_int);col*=1.-0.2*length(uv*vec2(.55,1.));gl_FragColor=vec4(col,1.);}`}
  ];

  function sh(t,s){ const o=gl.createShader(t); gl.shaderSource(o,s); gl.compileShader(o); if(!gl.getShaderParameter(o,gl.COMPILE_STATUS)) console.error('bg shader:',gl.getShaderInfoLog(o)); return o; }
  const vs=sh(gl.VERTEX_SHADER,VS);
  gl.bindBuffer(gl.ARRAY_BUFFER,gl.createBuffer());
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const progs=[];
  function build(i){
    const p=gl.createProgram();
    gl.attachShader(p,vs); gl.attachShader(p,sh(gl.FRAGMENT_SHADER,HDR+LIB+BG[i].src));
    gl.linkProgram(p);
    return {p,a:gl.getAttribLocation(p,'p'),res:gl.getUniformLocation(p,'u_res'),time:gl.getUniformLocation(p,'u_time'),mouse:gl.getUniformLocation(p,'u_mouse'),int:gl.getUniformLocation(p,'u_int')};
  }
  let cur=Math.min(BG.length-1,Math.max(0,+store.get('deck.bg',0)));
  function activate(i){
    cur=i; if(!progs[i]) progs[i]=build(i);
    const P=progs[i]; gl.useProgram(P.p);
    gl.enableVertexAttribArray(P.a); gl.vertexAttribPointer(P.a,2,gl.FLOAT,false,0,0);
    store.set('deck.bg',i);
  }
  activate(cur);

  const nameEl=document.getElementById('bgname'); let nameT;
  function showName(){ nameEl.textContent=(cur+1)+' · '+BG[cur].name; nameEl.style.opacity=1; clearTimeout(nameT); nameT=setTimeout(()=>nameEl.style.opacity=0,1500); }

  let tx=cv.width*.5, ty=cv.height*.5, mx=tx, my=ty, pulse=0;
  const rest=()=> document.body.classList.contains('conserve') ? 0.04 : 0.12;
  const flare=()=>{ pulse=1; };
  addEventListener('pointermove',e=>{ tx=e.clientX*(cv.width/innerWidth); ty=cv.height-e.clientY*(cv.height/innerHeight); });
  document.addEventListener('deck:transition',flare);
  document.addEventListener('keydown',e=>{
    if(e.target.matches && e.target.matches('input,textarea,select')) return;
    if(e.key==='w'||e.key==='W'){ activate((cur+1)%BG.length); pulse=1; showName(); if(reduce) draw(); }
  });

  const t0=performance.now();
  function render(intensity){
    const P=progs[cur];
    gl.uniform2f(P.res,cv.width,cv.height);
    gl.uniform1f(P.time,(performance.now()-t0)/1000);
    gl.uniform2f(P.mouse,mx,my);
    gl.uniform1f(P.int,intensity);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  }
  function draw(){ mx+=(tx-mx)*.12; my+=(ty-my)*.12; render(rest()); }
  if(reduce){
    draw(); addEventListener('resize',draw); document.addEventListener('deck:transition',()=>setTimeout(draw,16));
    return flare;
  }
  (function loop(){
    mx+=(tx-mx)*.06; my+=(ty-my)*.06; pulse*=0.955;
    render(rest()+pulse*1.05);
    requestAnimationFrame(loop);
  })();
  return flare;
})();

/* ---------- globe boot loader ----------
   Monochrome spinning globe (real country outlines via world-atlas,
   decoded inline — no library) inside a whirl, shown over the live
   wallpaper while the deck wires up, then faded out. */
(function bootGlobe(){
  const boot=document.getElementById('boot');
  const cv=document.getElementById('bootglobe');
  const dpr=Math.min(2,devicePixelRatio||1);
  cv.width=200*dpr; cv.height=200*dpr;
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  const R=62,CX=100,CY=100,T=-0.32,sT=Math.sin(T),cT=Math.cos(T);
  let rings=null;
  function ringify(topo){
    const tr=topo.transform;
    const arcs=topo.arcs.map(a=>{let x=0,y=0;return a.map(d=>{x+=d[0];y+=d[1];return[x*tr.scale[0]+tr.translate[0],y*tr.scale[1]+tr.translate[1]];});});
    const out=[]; const add=r=>{let pts=[];r.forEach(i=>{let a=i<0?arcs[~i].slice().reverse():arcs[i].slice();if(pts.length)a=a.slice(1);pts=pts.concat(a);});out.push(pts);};
    topo.objects.countries.geometries.forEach(g=>{ if(g.type==='Polygon')g.arcs.forEach(add); else if(g.type==='MultiPolygon')g.arcs.forEach(p=>p.forEach(add)); });
    return out;
  }
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json()).then(t=>{rings=ringify(t);}).catch(()=>{});
  function proj(lon,lat,rot){ const L=(lon-rot)*Math.PI/180,P=lat*Math.PI/180,sP=Math.sin(P),cP=Math.cos(P),cL=Math.cos(L); return [CX+R*cP*Math.sin(L),CY-R*(cT*sP-sT*cP*cL),sT*sP+cT*cP*cL>0]; }
  function strokeRings(list,rot){ ctx.beginPath(); for(const ring of list){let pen=false;for(const pt of ring){const[x,y,v]=proj(pt[0],pt[1],rot);if(v){if(pen)ctx.lineTo(x,y);else{ctx.moveTo(x,y);pen=true;}}else pen=false;}} ctx.stroke(); }
  const grat=[];
  for(let lon=-180;lon<180;lon+=30){const r=[];for(let lat=-85;lat<=85;lat+=5)r.push([lon,lat]);grat.push(r);}
  for(let lat=-60;lat<=60;lat+=30){const r=[];for(let lon=-180;lon<=180;lon+=5)r.push([lon,lat]);grat.push(r);}
  function frame(now){
    if(boot.classList.contains('gone')) return;
    const t=now/1000,rot=t*42;
    ctx.fillStyle='#f2f0ea';ctx.fillRect(0,0,200,200);ctx.lineCap='round';
    for(let i=0;i<22;i++){const a=-t*1.5+i*2.4,r2=80+9*Math.sin(t*1.7+i*1.3),len=0.18+0.12*Math.sin(i*2.1+t);ctx.beginPath();ctx.strokeStyle='rgba(40,40,40,'+(0.06+0.10*((i*37)%10)/10).toFixed(2)+')';ctx.lineWidth=1+((i*13)%3)*0.5;ctx.arc(CX,CY,r2,a,a+len);ctx.stroke();}
    ctx.setLineDash([1,7]);ctx.lineDashOffset=-t*14;ctx.beginPath();ctx.strokeStyle='rgba(40,40,40,0.25)';ctx.lineWidth=1;ctx.arc(CX,CY,72,0,7);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();ctx.fillStyle='#faf9f5';ctx.arc(CX,CY,R,0,7);ctx.fill();
    ctx.beginPath();ctx.lineWidth=1.4;ctx.strokeStyle='#2b2b2b';ctx.arc(CX,CY,R,0,7);ctx.stroke();
    ctx.lineWidth=0.5;ctx.strokeStyle='rgba(43,43,43,0.18)';strokeRings(grat,rot);
    if(rings){ctx.lineWidth=0.7;ctx.strokeStyle='#2b2b2b';strokeRings(rings,rot);}
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  let done=false;
  window.__dismissBoot=function(){
    if(done) return; done=true;
    boot.classList.add('gone');
    document.dispatchEvent(new CustomEvent('deck:transition'));   /* big flare as the deck reveals */
    setTimeout(()=>{ boot.style.display='none'; },700);
  };
  setTimeout(window.__dismissBoot,1600);   /* fade once the deck has wired up */
})();

/* ---------- boot ---------- */
(function boot(){
  const cap=+store.get('deck.cap',3); capInput.value=cap; applyCapacity(cap);
  setActive(store.get('deck.view','overview'));
})();
